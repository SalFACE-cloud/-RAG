# 青澜教育知识库 RAG 自动化流水线（方案 B：分步 CLI）
name: Edu Knowledge RAG Pipeline

on:
  push:
    branches: [main, master, dev]
    paths:
      - "vault/1_政策与课标/**"
      - "vault/2_教材库/**"
      - "vault/3_教辅资料/**"
      - "vault/4_题库与试卷/**"
      - "vault/6_知识图谱/**"
      - "vault/8_外购数据管理/**"
      - "vault/9_数据流水线/**"
      - ".github/workflows/knowledge-pipeline.yml"
      - "services/pipeline/**"
      - "services/indexer/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  knowledge-process:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      QDRANT_URL: http://127.0.0.1:6333
      MEILI_URL: http://127.0.0.1:7700
      MEILI_MASTER_KEY: edu_meili_dev_2026
      REDIS_HOST: localhost
      EMBEDDING_MODEL: BAAI/bge-m3
      VAULT_ROOT_PATH: ./vault
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
      IGNORE_VAULT_PATHS: "0_项目文档/**"
      USE_FP16: "false"
      HF_HUB_DISABLE_TELEMETRY: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'services/pipeline/requirements.txt', 'services/indexer/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pipeline dependencies
        run: pip install -r requirements.txt

      - name: Start docker middleware
        run: |
          docker compose up -d qdrant postgres redis meilisearch
          for i in $(seq 1 45); do
            curl -sf http://localhost:6333/healthz && curl -sf http://localhost:7700/health && exit 0
            sleep 2
          done
          echo "middleware not ready" && exit 1

      - name: Validate vault document metadata
        run: |
          python services/pipeline/metadata_validator.py \
            --vault-path "${{ env.VAULT_ROOT_PATH }}" \
            --ignore-path "${{ env.IGNORE_VAULT_PATHS }}"

      - name: Convert file format & incremental track
        run: |
          python services/pipeline/file_tracker.py \
            --scan-mode git_diff \
            --vault-path "${{ env.VAULT_ROOT_PATH }}" \
            --ignore-path "${{ env.IGNORE_VAULT_PATHS }}"

      - name: Chunk & Embedding & Update Vector DB
        env:
          HF_ENDPOINT: https://hf-mirror.com
          HF_HUB_DOWNLOAD_TIMEOUT: "600"
        run: |
          python services/indexer/chunker.py \
            --vault-path "${{ env.VAULT_ROOT_PATH }}" \
            --ignore-paths "${{ env.IGNORE_VAULT_PATHS }}" \
            --chunk-size "${{ env.CHUNK_SIZE }}" \
            --chunk-overlap "${{ env.CHUNK_OVERLAP }}"
          python services/indexer/embedder.py \
            --vault-path "${{ env.VAULT_ROOT_PATH }}" \
            --mock-embeddings

      - name: Sync meilisearch full-text index
        run: python services/indexer/meili_indexer.py

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-log
          path: vault/9_数据流水线/logs/

      - name: Verify pipeline artifacts
        run: |
          test -f vault/9_数据流水线/logs/chunks_manifest.json
          test -f vault/9_数据流水线/logs/pipeline_result.json
          python -c "import json; m=json.load(open('vault/9_数据流水线/logs/chunks_manifest.json',encoding='utf-8')); n=len(m.get('chunks',[])); f=len(m.get('files',[])); assert n>0, 'no chunks'; print(f'pipeline_ok files={f} chunks={n}')"
