services:
  postgres:
    image: postgres:16-alpine
    container_name: edu_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edu_kb}
      POSTGRES_USER: ${POSTGRES_USER:-edu_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu_admin -d edu_kb"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: edu_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: edu_meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-edu_meili_dev_2026}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  neo4j:
    image: neo4j:5.20-community
    container_name: edu_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-edu_neo4j_2026}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  redis:
    image: redis:7-alpine
    container_name: edu_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: edu_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-edu_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-edu_minio_2026}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  rq-dashboard:
    image: eoranged/rq-dashboard:latest
    container_name: edu_rq_dashboard
    ports:
      - "9181:9181"
    environment:
      RQ_DASHBOARD_REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  meili_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  minio_data:
